<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>DocuIA - Projetos</title>

    <link rel="stylesheet" href="{{ url_for('static', path='css/style.css') }}?v=5">
    <script src="{{ url_for('static', path='js/auth-guard.js') }}"></script>
    <script src="/api-config.js"></script>
    <script src="{{ url_for('static', path='js/api.js?v=2') }}"></script>
</head>

<body class="dashboard-body">

<!-- SIDEBAR -->
<aside class="sidebar">

    <div class="sidebar-logo">
        <h2>DocuIA</h2>
        <p>Documentação Inteligente</p>
    </div>

    <nav class="menu">

        <a href="/dashboard">
            <img src="{{ url_for('static', path='pngs/dashboard.png') }}" alt="Dashboard" style="width:14px; height:14px; vertical-align:text-bottom; "> <span>Dashboard</span>
        </a>

        <a href="/empresas">
            <img src="{{ url_for('static', path='pngs/business-and-trade.png') }}" alt="Empresas" style="width:14px; height:14px; vertical-align:text-bottom; "> <span>Empresas</span>
        </a>

        <a class="active" href="/projetos">
            <img src="{{ url_for('static', path='pngs/folder.png') }}" alt="Projetos" style="width:14px; height:14px; vertical-align:text-bottom; "> <span>Projetos</span>
        </a>

    </nav>

    <div class="sidebar-bottom">



        <div class="user-dropdown-area">

            <div class="user-menu" id="userMenu">

                <a href="/perfil">
                    ♙ Meu Perfil
                </a>


                <div class="menu-divider"></div>

                <a href="/login" class="logout-link">
                    ↪ Sair
                </a>

            </div>

            <button class="user-box user-toggle" onclick="toggleUserMenu()">

                <div class="profile-mini-avatar">
                    U
                </div>

                <div class="user-info">
                    <strong id="sidebar-user-name">Usuário</strong>
                    <p id="sidebar-user-email">email@exemplo.com</p>
                </div>

                <span class="dropdown-arrow">⌄</span>

            </button>

        </div>

    </div>

</aside>

<!-- MAIN -->
<main class="dashboard-main">

    <section class="projects-content">

        <!-- HEADER -->
        <header class="projects-header">

            <div>

                <h1>Meus Projetos</h1>

                <p id="header-subtitle">
                    ▤ Geral
                </p>

            </div>

            <button class="new-project-btn" id="btn-novo-projeto">
                + Novo Projeto
            </button>

        </header>

        <!-- SEARCH -->
        <div class="projects-search">

            <span>⌕</span>

            <input
                type="text"
                placeholder="Buscar projetos pelo nome..."
            >

        </div>

        <!-- FILTERS -->
        <div class="projects-filters">

            <button class="filter-btn active-filter">
                Todos
            </button>

            <button class="filter-btn">
                Ativos
            </button>

            <button class="filter-btn">
                Arquivados
            </button>

            <div class="filter-divider"></div>

            <select class="category-select">
                <option>Todas Categorias</option>
            </select>

        </div>

        <!-- GRID -->
        <section class="projects-grid" id="projects-grid">
            <!-- Projetos serão carregados aqui via JS -->
            <p style="padding: 32px; grid-column: 1/-1; text-align: center; color: #666;">Carregando projetos...</p>
        </section>

    </section>

</main>

<div class="help-btn">
    ?
</div>

<script>
const PROJECT_COLOR_CLASSES = ['teal', 'rose', 'amber', 'indigo', 'emerald', 'cyan'];
const companiesById = new Map();

function resolveProjectColor(project) {
    if (PROJECT_COLOR_CLASSES.includes(project.cor)) {
        return project.cor;
    }
    const company = companiesById.get(project.empresa_id);
    if (company && PROJECT_COLOR_CLASSES.includes(company.cor)) {
        return company.cor;
    }
    return 'teal';
}

async function loadProjects() {
    try {
        // 1. Perfil do Usuário
        const user = await getUserProfile();
        document.getElementById('sidebar-user-name').innerText = user.nome;
        document.getElementById('sidebar-user-email').innerText = user.email;

        // 2. Carregar Projetos e Empresas
        const [resp, empResp] = await Promise.all([
            fetch(API_URLS.projetos + "/projetos", { headers: authHeaders() }),
            fetch(API_URLS.empresas + "/empresas", { headers: authHeaders() })
        ]);
        const projects = await handleResponse(resp);
        const companies = await handleResponse(empResp);

        companiesById.clear();
        companies.forEach(c => companiesById.set(c.id, c));

        const activeProjects = projects.filter(p => p.status !== 'arquivado');
        renderProjects(activeProjects);

        // 3. Carregar Empresas para o Select
        const selectEmpresa = document.getElementById('create-projeto-empresa');
        if (selectEmpresa) {
            selectEmpresa.innerHTML = '<option value="">Selecione uma empresa...</option>' + 
                companies.map(c => `<option value="${c.id}">${c.nome}</option>`).join('');
        }

    } catch (error) {
        console.error("Erro ao carregar projetos:", error);
    }
}

function renderProjects(projects) {
    const grid = document.getElementById('projects-grid');
    if (projects.length === 0) {
        grid.innerHTML = '<p style="padding: 32px; grid-column: 1/-1; text-align: center; color: #666;">Você ainda não possui projetos.</p>';
        return;
    }

    grid.innerHTML = projects.map(p => `
        <article class="project-card" onclick="window.location.href='/projeto?id=${p.id}'" style="cursor: pointer;">
            <div class="project-top">
                <div class="project-main-info">
                    <div class="project-icon ${resolveProjectColor(p)}">
                        <img src="/static/pngs/folder.png" alt="Projeto" style="width: 15px; height: 15px;">
                    </div>
                    <div>
                        <div class="project-title-row">
                            <h2>${p.nome}</h2>
                        </div>
                        <div class="project-tags">
                            <span class="tag ${p.status === 'ativo' ? 'green-tag' : 'gray-tag'}">
                                ${p.status.charAt(0).toUpperCase() + p.status.slice(1)}
                            </span>
                            <span class="tag purple-tag">
                                ◇ ${p.categoria || 'Geral'}
                            </span>
                        </div>
                    </div>
                </div>
                <span class="project-dots">⋮</span>
            </div>
            <p class="project-description">${p.descricao || 'Sem descrição'}</p>
            <p class="project-link">${p.link_repo || 'Sem repositório vinculado'}</p>
            <div class="project-footer">
                <span><img src="/static/pngs/users.png" style="width:11px; height:11px; vertical-align:text-bottom; "> ?</span>
                <span><img src="/static/pngs/file.png" style="width:11px; height:11px; vertical-align:text-bottom; "> ?</span>
                <span>◫ ${new Date(p.criado_em).toLocaleDateString()}</span>
            </div>
        </article>
    `).join('');
}

// Abrir Modal de Criar Projeto
document.getElementById('btn-novo-projeto').addEventListener('click', () => {
    document.getElementById('create-project-modal').classList.add('show');
});

function closeCreateProjectModal() {
    document.getElementById('create-project-modal').classList.remove('show');
    document.getElementById('create-projeto-nome').value = '';
    document.getElementById('create-projeto-empresa').value = '';
    document.getElementById('create-projeto-categoria').value = '';
}

async function submitCreateProject() {
    const empresaId = document.getElementById('create-projeto-empresa').value;
    const nome = document.getElementById('create-projeto-nome').value.trim();
    const categoria = document.getElementById('create-projeto-categoria').value.trim() || "Geral";

    if (!empresaId) return alert("Selecione uma empresa.");
    if (!nome) return alert("O nome do projeto é obrigatório.");

    const btn = document.querySelector('#create-project-modal .btn-acao');
    try {
        btn.innerText = "Criando..."; 
        btn.disabled = true;

        const resp = await fetch(API_URLS.projetos + "/projetos", {
            method: "POST",
            headers: authHeaders(),
            body: JSON.stringify({
                nome: nome,
                descricao: "Projeto criado via lista geral",
                empresa_id: parseInt(empresaId),
                categoria: categoria
            })
        });
        await handleResponse(resp);
        
        alert("Projeto criado com sucesso!");
        closeCreateProjectModal();
        loadProjects();
    } catch (error) {
        alert(error.message);
    } finally {
        btn.innerText = "Criar Projeto"; 
        btn.disabled = false;
    }
}

document.addEventListener('DOMContentLoaded', loadProjects);

function toggleUserMenu() {
    const menu = document.getElementById("userMenu");
    menu.classList.toggle("show");
}
</script>

<!-- MODAL CRIAR NOVO PROJETO -->
<div id="create-project-modal" class="modal-overlay">
    <div class="modal-card">
        <h2 style="font-size: 19px; font-weight: 800; color: #020617; margin-bottom: 19px;">Criar Novo Projeto</h2>
        
        <div class="modal-form-group">
            <label>Empresa</label>
            <select id="create-projeto-empresa" class="form-control" style="width: 100%; padding: 10px; border: 1px solid #e2e8f0; border-radius: 6px; font-size: 12px; color: #0f172a; margin-top: 3px;">
                <option value="">Selecione uma empresa...</option>
                <!-- Preenchido via JS -->
            </select>
        </div>

        <div class="modal-form-group">
            <label>Nome do Projeto</label>
            <input type="text" id="create-projeto-nome" placeholder="Ex: Portal de Documentação">
        </div>
        
        <div class="modal-form-group">
            <label>Categoria</label>
            <input type="text" id="create-projeto-categoria" placeholder="Ex: Desenvolvimento">
        </div>
        
        <div class="modal-footer-btns">
            <button class="btn-voltar" onclick="closeCreateProjectModal()">Cancelar</button>
            <button class="btn-acao" onclick="submitCreateProject()">Criar Projeto</button>
        </div>
    </div>
</div>

</body>
</html>
