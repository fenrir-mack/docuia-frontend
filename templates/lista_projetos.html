<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>DocIA - Projetos</title>

    <link rel="stylesheet" href="{{ url_for('static', path='css/style.css') }}?v=5">
    <link rel="stylesheet" href="{{ url_for('static', path='css/sidebar.css') }}?v=1">
    <script src="{{ url_for('static', path='js/auth-guard.js') }}"></script>
    <script src="/api-config.js"></script>
    <script src="{{ url_for('static', path='js/api.js?v=2') }}"></script>
</head>

<body class="dashboard-body">

<!-- SIDEBAR -->
<aside class="sidebar">

    <div class="sidebar-logo">
        <h2>DocIA</h2>
        <p>Documentação Inteligente</p>
    </div>

    <nav class="menu">

        <a href="/dashboard">
            <img src="{{ url_for('static', path='pngs/dashboard.png') }}" alt="Dashboard" style="width:14px; height:14px; vertical-align:text-bottom; "> <span>Dashboard</span>
        </a>

        <a href="/empresas">
            <img src="{{ url_for('static', path='pngs/business-and-trade.png') }}" alt="Empresas" style="width:14px; height:14px; vertical-align:text-bottom; "> <span>Empresas</span>
        </a>

        <a class="active" href="/projetos">
            <img src="{{ url_for('static', path='pngs/folder.png') }}" alt="Projetos" style="width:14px; height:14px; vertical-align:text-bottom; "> <span>Projetos</span>
        </a>

    </nav>

    <div class="sidebar-bottom">



        <div class="user-dropdown-area">

            <div class="user-menu" id="userMenu">

                <a href="/perfil"><img src="{{ url_for('static', path='pngs/user.png') }}" alt="Meu Perfil">Meu Perfil</a>


                <div class="menu-divider"></div>

                <a href="/login" class="logout-link"><img src="{{ url_for('static', path='pngs/corner-down-right.png') }}" alt="Sair">Sair</a>

            </div>

            <button class="user-box user-toggle" onclick="toggleUserMenu()">

                <div class="profile-mini-avatar">
                    U
                </div>

                <div class="user-info">
                    <strong id="sidebar-user-name">Usuário</strong>
                    <p id="sidebar-user-email">email@exemplo.com</p>
                </div>

                <span class="dropdown-arrow"><img src="{{ url_for('static', path='pngs/down-arrow.png') }}" alt="Abrir menu"></span>

            </button>

        </div>

    </div>

</aside>

<!-- MAIN -->
<main class="dashboard-main">

    <section class="projects-content">

        <!-- HEADER -->
        <header class="projects-header">

            <div>

                <h1>Meus Projetos</h1>

                <p id="header-subtitle">
                    Carregando...
                </p>

            </div>

            <button class="new-project-btn" id="btn-novo-projeto">
                + Novo Projeto
            </button>

        </header>

        <!-- SEARCH -->
        <div class="projects-search">
            <img src="{{ url_for('static', path='pngs/search.png') }}" alt="Buscar">

            <input
                type="text"
                placeholder="Buscar projetos pelo nome..."
            >

        </div>

        <!-- FILTERS -->
        <div class="projects-filters">

            <button class="filter-btn active-filter">
                Todos
            </button>

            <button class="filter-btn">
                Ativos
            </button>

            <button class="filter-btn">
                Arquivados
            </button>

        </div>

        <!-- GRID -->
        <section class="projects-grid" id="projects-grid">
            <p style="padding: 32px; grid-column: 1/-1; text-align: center; color: #666;">Carregando projetos...</p>
        </section>

    </section>

</main>

<div class="help-btn">
    ?
</div>

<script>
const PROJECT_COLOR_CLASSES = ['teal', 'rose', 'amber', 'indigo', 'emerald', 'cyan'];
const companiesById = new Map();
let allProjects = [];
let currentFilter = 'todos';
const recentAccessByProjectId = new Map();

function resolveProjectColor(project) {
    if (PROJECT_COLOR_CLASSES.includes(project.cor)) {
        return project.cor;
    }
    const company = companiesById.get(project.empresa_id);
    if (company && PROJECT_COLOR_CLASSES.includes(company.cor)) {
        return company.cor;
    }
    return 'teal';
}

async function loadProjects() {
    try {
        const user = await getUserProfile();
        document.getElementById('sidebar-user-name').innerText = user.nome;
        document.getElementById('sidebar-user-email').innerText = user.email;

        // 2. Carregar Projetos e Empresas
        const [resp, empResp, recentResp] = await Promise.all([
            fetch(API_URLS.projetos + "/projetos", { headers: authHeaders() }),
            fetch(API_URLS.empresas + "/empresas", { headers: authHeaders() }),
            fetch(API_URLS.projetos + "/projetos/recentes?limit=50", { headers: authHeaders() })
        ]);
        const projects = await handleResponse(resp);
        const companies = await handleResponse(empResp);
        const recentes = await handleResponse(recentResp).catch(() => []);

        companiesById.clear();
        companies.forEach(c => companiesById.set(c.id, c));
        recentAccessByProjectId.clear();
        if (Array.isArray(recentes)) {
            recentes.forEach((r) => {
                if (r && r.id != null && r.ultimo_acesso_em) {
                    recentAccessByProjectId.set(Number(r.id), String(r.ultimo_acesso_em));
                }
            });
        }

        const visibleProjectsBasic = projects.filter(p => p.status !== 'excluido');

        // Buscar detalhes para exibir a descrição (MS3)
        const detailedProjects = await Promise.all(
            visibleProjectsBasic.map(async (p) => {
                try {
                    const r = await fetch(API_URLS.projetos + `/projetos/${p.id}`, { headers: authHeaders() });
                    const details = await handleResponse(r);
                    return { ...p, ...details };
                } catch {
                    return p;
                }
            })
        );

        // Ordena por acesso mais recente; sem acesso, mantém no fim e ordena por id (mais novo primeiro)
        allProjects = detailedProjects.sort((a, b) => {
            const aRecent = recentAccessByProjectId.get(Number(a.id));
            const bRecent = recentAccessByProjectId.get(Number(b.id));
            const aTs = aRecent ? Date.parse(aRecent) : Number.NEGATIVE_INFINITY;
            const bTs = bRecent ? Date.parse(bRecent) : Number.NEGATIVE_INFINITY;
            if (aTs !== bTs) return bTs - aTs;
            return Number(b.id || 0) - Number(a.id || 0);
        });
        applyCurrentFilter();

        // 3. Carregar Empresas para o Select
        const selectEmpresa = document.getElementById('create-projeto-empresa');
        if (selectEmpresa) {
            selectEmpresa.innerHTML = '<option value="">Selecione uma empresa...</option>' + 
                companies.map(c => `<option value="${c.id}">${c.nome}</option>`).join('');
        }

    } catch (error) {
        console.error("Erro ao carregar projetos:", error);
    }
}

function renderProjects(projects) {
    const grid = document.getElementById('projects-grid');
    if (projects.length === 0) {
        grid.innerHTML = '<p style="padding: 32px; grid-column: 1/-1; text-align: center; color: #666;">Você ainda não possui projetos.</p>';
        return;
    }

    grid.innerHTML = projects.map(p => `
        <article class="project-card" data-project-id="${p.id}" onclick="window.location.href='/projeto?id=${p.id}'" style="cursor: pointer;">
            <div class="project-top">
                <div class="project-main-info">
                    <div class="project-icon ${resolveProjectColor(p)}">
                        <img src="/static/pngs/folder.png" alt="Projeto" style="width: 15px; height: 15px;">
                    </div>
                    <div>
                        <div class="project-title-row">
                            <h2>${p.nome}</h2>
                        </div>
                        <div class="project-tags">
                            <span class="tag ${p.status === 'ativo' ? 'green-tag' : 'gray-tag'}">
                                ${p.status.charAt(0).toUpperCase() + p.status.slice(1)}
                            </span>
                        </div>
                    </div>
                </div>
                <div style="position:relative; display:flex; align-items:center; justify-content:center;">
                    <button type="button" class="project-dots" aria-label="Ações do projeto" onclick="toggleProjectMenu(event, ${p.id})" title="Ações do projeto" style="border:0; background:transparent; cursor:pointer; display:flex; align-items:center; justify-content:center; width:22px; height:22px; padding:0;">
                        <img src="/static/pngs/ellipsis-vertical.png" alt="" style="width:16px; height:16px;">
                    </button>
                    <div id="project-menu-${p.id}" class="project-action-menu" style="display:none; position:absolute; top:26px; right:0; background:#fff; border:1px solid #e2e8f0; border-radius:8px; box-shadow:0 8px 24px rgba(15,23,42,.12); min-width:130px; z-index:20;">
                        ${p.status === 'arquivado'
                            ? `<button type="button" onclick="unarchiveProject(event, ${p.id})" style="width:100%; border:0; background:#fff; text-align:left; font-size:12px; color:#0f172a; padding:9px 11px; border-radius:8px; cursor:pointer;">Desarquivar</button>`
                            : `<button type="button" onclick="archiveProject(event, ${p.id})" style="width:100%; border:0; background:#fff; text-align:left; font-size:12px; color:#0f172a; padding:9px 11px; border-radius:8px; cursor:pointer;">Arquivar</button>`
                        }
                    </div>
                </div>
            </div>
            <p class="project-description">${p.descricao || 'Sem descrição'}</p>
        </article>
    `).join('');
}

function applyCurrentFilter() {
    let filtered = allProjects;
    if (currentFilter === 'ativos') filtered = allProjects.filter(p => p.status !== 'arquivado');
    if (currentFilter === 'arquivados') filtered = allProjects.filter(p => p.status === 'arquivado');

    const label = currentFilter === 'ativos' ? 'ativo(s)' : (currentFilter === 'arquivados' ? 'arquivado(s)' : 'no total');
    document.getElementById('header-subtitle').innerText = `${filtered.length} projeto(s) ${label}`;
    renderProjects(filtered);
}

async function archiveProject(event, projectId) {
    event.stopPropagation();
    event.preventDefault();
    closeAllProjectMenus();
    if (!confirm("Tem certeza que deseja arquivar este projeto?")) return;

    const button = event.currentTarget;
    const originalHtml = button.innerHTML;
    button.disabled = true;
    button.innerHTML = '<span style="font-size:11px;color:#64748b;">...</span>';

    try {
        const resp = await fetch(API_URLS.projetos + "/projetos/" + projectId + "/arquivar", {
            method: "PUT",
            headers: authHeaders()
        });
        await handleResponse(resp);
        alert("Projeto arquivado com sucesso.");
        await loadProjects();
    } catch (error) {
        alert(error.message);
        button.disabled = false;
        button.innerHTML = originalHtml;
    }
}

async function unarchiveProject(event, projectId) {
    event.stopPropagation();
    event.preventDefault();
    closeAllProjectMenus();
    if (!confirm("Tem certeza que deseja desarquivar este projeto?")) return;

    try {
        const resp = await fetch(API_URLS.projetos + "/projetos/" + projectId + "/desarquivar", {
            method: "PUT",
            headers: authHeaders()
        });
        await handleResponse(resp);
        alert("Projeto desarquivado com sucesso.");
        await loadProjects();
    } catch (error) {
        alert(error.message);
    }
}

function toggleProjectMenu(event, projectId) {
    event.stopPropagation();
    event.preventDefault();
    const menu = document.getElementById(`project-menu-${projectId}`);
    if (!menu) return;
    const isOpen = menu.style.display === 'block';
    closeAllProjectMenus();
    if (!isOpen) menu.style.display = 'block';
}

function closeAllProjectMenus() {
    document.querySelectorAll('.project-action-menu').forEach((el) => {
        el.style.display = 'none';
    });
}

// Abrir Modal de Criar Projeto
document.getElementById('btn-novo-projeto').addEventListener('click', () => {
    document.getElementById('create-project-modal').classList.add('show');
});

function closeCreateProjectModal() {
    document.getElementById('create-project-modal').classList.remove('show');
    document.getElementById('create-projeto-nome').value = '';
    const descEl = document.getElementById('create-projeto-descricao');
    if (descEl) descEl.value = '';
    document.getElementById('create-projeto-empresa').value = '';
}

async function submitCreateProject() {
    const empresaId = document.getElementById('create-projeto-empresa').value;
    const nome = document.getElementById('create-projeto-nome').value.trim();
    const descricao = (document.getElementById('create-projeto-descricao')?.value || '').trim();

    if (!empresaId) return alert("Selecione uma empresa.");
    if (!nome) return alert("O nome do projeto é obrigatório.");

    const btn = document.querySelector('#create-project-modal .btn-acao');
    try {
        btn.innerText = "Criando..."; 
        btn.disabled = true;

        const resp = await fetch(API_URLS.projetos + "/projetos", {
            method: "POST",
            headers: authHeaders(),
                body: JSON.stringify({
                    nome: nome,
                    descricao: descricao,
                    empresa_id: parseInt(empresaId),
                })
            });
        await handleResponse(resp);
        
        alert("Projeto criado com sucesso!");
        closeCreateProjectModal();
        loadProjects();
    } catch (error) {
        alert(error.message);
    } finally {
        btn.innerText = "Criar Projeto"; 
        btn.disabled = false;
    }
}

document.addEventListener('DOMContentLoaded', loadProjects);

document.addEventListener('DOMContentLoaded', () => {
    const filterButtons = Array.from(document.querySelectorAll('.projects-filters .filter-btn'));
    filterButtons.forEach((btn) => {
        btn.addEventListener('click', () => {
            filterButtons.forEach((b) => b.classList.remove('active-filter'));
            btn.classList.add('active-filter');
            const txt = btn.innerText.trim().toLowerCase();
            if (txt === 'ativos') currentFilter = 'ativos';
            else if (txt === 'arquivados') currentFilter = 'arquivados';
            else currentFilter = 'todos';
            applyCurrentFilter();
        });
    });
});

window.addEventListener('click', () => closeAllProjectMenus());

function toggleUserMenu() {
    const menu = document.getElementById("userMenu");
    menu.classList.toggle("show");
}
</script>

<!-- MODAL CRIAR NOVO PROJETO -->
<div id="create-project-modal" class="modal-overlay">
    <div class="modal-card">
        <h2 style="font-size: 19px; font-weight: 800; color: #020617; margin-bottom: 19px;">Criar Novo Projeto</h2>
        
        <div class="modal-form-group">
            <label>Empresa</label>
            <select id="create-projeto-empresa" class="form-control" style="width: 100%; padding: 10px; border: 1px solid #e2e8f0; border-radius: 6px; font-size: 12px; color: #0f172a; margin-top: 3px;">
                <option value="">Selecione uma empresa...</option>
                <!-- Preenchido via JS -->
            </select>
        </div>

        <div class="modal-form-group">
            <label>Nome do Projeto</label>
            <input type="text" id="create-projeto-nome" placeholder="Ex: Portal de Documentação">
        </div>

        <div class="modal-form-group">
            <label>Descrição do Projeto</label>
            <textarea id="create-projeto-descricao" placeholder="Opcional: descreva o objetivo do projeto..." style="width: 100%; min-height: 90px; resize: vertical;"></textarea>
        </div>
        
        <div class="modal-footer-btns">
            <button class="btn-voltar" onclick="closeCreateProjectModal()">Cancelar</button>
            <button class="btn-acao" onclick="submitCreateProject()">Criar Projeto</button>
        </div>
    </div>
</div>

</body>
</html>
