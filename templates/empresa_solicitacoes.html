<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>DocuIA - Solicitações da Empresa</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src="{{ url_for('static', filename='js/auth-guard.js') }}"></script>
    <script src="/api-config.js"></script>
    <script src="{{ url_for('static', filename='js/api.js') }}"></script>
</head>

<body class="dashboard-body">

<aside class="sidebar">
    <div class="sidebar-logo">
        <h2>DocuIA</h2>
        <p>Documentação Inteligente</p>
    </div>

    <nav class="menu">
        <a href="/dashboard">
            <img src="{{ url_for('static', filename='pngs/dashboard.png') }}" alt="Dashboard" style="width:18px; height:18px; vertical-align:text-bottom; filter: grayscale(100%) opacity(0.6);"> <span>Dashboard</span>
        </a>
        <a class="active" href="/empresas">
            <img src="{{ url_for('static', filename='pngs/business-and-trade.png') }}" alt="Empresas" style="width:18px; height:18px; vertical-align:text-bottom; filter: brightness(0) invert(1);"> <span>Empresas</span>
        </a>
        <a href="/projetos">
            <img src="{{ url_for('static', filename='pngs/folder.png') }}" alt="Projetos" style="width:18px; height:18px; vertical-align:text-bottom; filter: grayscale(100%) opacity(0.6);"> <span>Projetos</span>
        </a>
    </nav>

    <div class="sidebar-bottom">
        <div class="user-dropdown-area">
            <div class="user-menu" id="userMenu">
                <a href="/perfil">♙ Meu Perfil</a>
                <div class="menu-divider"></div>
                <a href="/login" class="logout-link">↪ Sair</a>
            </div>
            <button class="user-box user-toggle" onclick="toggleUserMenu()">
                <div class="profile-mini-avatar">U</div>
                <div class="user-info">
                    <strong id="sidebar-user-name">Usuário</strong>
                    <p id="sidebar-user-email">email@exemplo.com</p>
                </div>
                <span class="dropdown-arrow">⌄</span>
            </button>
        </div>
    </div>
</aside>

<main class="dashboard-main">

    <section class="project-internal-content" style="padding: 24px;">

        <div class="project-header-section">
            <div class="project-title-area">
                <div class="project-icon-large" style="background: #8b5cf6;">
                    <img src="{{ url_for('static', filename='pngs/business-and-trade.png') }}" alt="Empresa" style="width:28px; height:28px; filter: brightness(0) invert(1);">
                </div>
                <div class="project-info-large">
                    <h1 id="company-name">Carregando...</h1>
                    <p id="company-description">Carregando descrição da empresa...</p>
                </div>
            </div>
        </div>

                <div class="company-stats-grid">
            <div class="company-stat-card">
                <span><img src="/static/pngs/folder.png" alt="Projetos" style="width:14px; height:14px;"> Projetos</span>
                <strong id="stats-projects">0</strong>
            </div>
            <div class="company-stat-card">
                <span><img src="/static/pngs/users.png" alt="Membros" style="width:14px; height:14px;"> Membros</span>
                <strong id="stats-members">0</strong>
            </div>
            <div class="company-stat-card">
                <span><img src="/static/pngs/file.png" alt="Documentos" style="width:14px; height:14px;"> Documentos</span>
                <strong style="font-size: 14px; font-weight: normal; color: #6b7280; padding-top: 4px;">Em breve</strong>
            </div>
        </div>

        <div class="project-tabs" id="company-tabs">
            <a href="#" class="tab" id="tab-projetos">Projetos</a>
            <a href="#" class="tab" id="tab-membros">Membros</a>
            <a href="#" class="tab active" id="tab-solicitacoes">Solicitações <span class="tab-badge" id="tab-badge-sol">0</span></a>
            <a href="#" class="tab" id="tab-configuracoes">Configurações</a>
        </div>

        <div class="members-header">
            <h2>Solicitações Pendentes</h2>
        </div>

        <div id="solicitacoes-list">
            <p style="padding: 20px; color: #666;">Carregando solicitações...</p>
        </div>

    </section>

</main>

<div class="help-btn">?</div>

<script>
const urlParams = new URLSearchParams(window.location.search);
const companyId = urlParams.get('id');

if (!companyId) {
    alert("Empresa não especificada!");
    window.location.href = "/empresas";
}

async function loadSolicitacoesPage() {
    try {
        // Injeta hrefs das tabs com o ?id= correto
        document.getElementById('tab-projetos').href = `/empresa?id=${companyId}`;
        document.getElementById('tab-membros').href = `/empresa/membros?id=${companyId}`;
        document.getElementById('tab-solicitacoes').href = `/empresa/solicitacoes?id=${companyId}`;
        document.getElementById('tab-configuracoes').href = `/empresa/configuracoes?id=${companyId}`;

        // 1. Perfil do Usuário (Sidebar)
        const userResp = await fetch(API_URLS.auth + "/perfil/me", { headers: authHeaders() });
        const user = await handleResponse(userResp);
        document.getElementById('sidebar-user-name').innerText = user.nome;
        document.getElementById('sidebar-user-email').innerText = user.email;

        // 2. Detalhes da Empresa
        const compResp = await fetch(API_URLS.empresas + "/empresas/" + companyId, { headers: authHeaders() });
        const company = await handleResponse(compResp);
        document.getElementById('company-name').innerText = company.nome;
        document.getElementById('company-description').innerText = company.descricao || "Sem descrição";

        // 3. Membros (para stats)
        const membersResp = await fetch(API_URLS.empresas + "/empresas/" + companyId + "/membros", { headers: authHeaders() });
        const members = await handleResponse(membersResp);
        document.getElementById('stats-members').innerText = members.length;

        // 4. Projetos (para stats)
        const projResp = await fetch(API_URLS.projetos + "/projetos", { headers: authHeaders() });
        const allProjects = await handleResponse(projResp);
        const companyProjects = allProjects.filter(p => p.empresa_id == companyId && p.status !== 'arquivado');
        document.getElementById('stats-projects').innerText = companyProjects.length;

        // 5. Solicitações
        const solResp = await fetch(API_URLS.empresas + "/empresas/" + companyId + "/solicitacoes", { headers: authHeaders() });
        const solicitacoes = await handleResponse(solResp);
        const pendentes = solicitacoes.filter(s => s.status === 'pendente');
                if (pendentes.length > 0) { document.getElementById('tab-badge-sol').innerText = pendentes.length; document.getElementById('tab-badge-sol').style.display = 'flex'; }
        
        // Buscar info dos usuários
        const userIds = solicitacoes.map(s => s.usuario_id);
        const usersMap = {};
        if (userIds.length > 0) {
            const usersResp = await fetch(API_URLS.auth + "/perfil/usuarios/batch", {
                method: "POST",
                headers: authHeaders(),
                body: JSON.stringify(userIds)
            });
            const usersInfo = await handleResponse(usersResp);
            usersInfo.forEach(u => usersMap[u.id] = u);
        }
        solicitacoes.forEach(s => s.user_details = usersMap[s.usuario_id] || { nome: "Usuário #" + s.usuario_id, cargo: "Sem cargo definido" });

        renderSolicitacoes(solicitacoes);

    } catch (error) {
        console.error("Erro ao carregar solicitações:", error);
    }
}

function renderSolicitacoes(solicitacoes) {
    const list = document.getElementById('solicitacoes-list');
    const pendentes = solicitacoes.filter(s => s.status === 'pendente');

    if (pendentes.length === 0) {
        list.innerHTML = '<p style="padding: 20px; color: #666;">Nenhuma solicitação pendente.</p>';
        return;
    }

    list.innerHTML = pendentes.map(s => `
        <div class="solicitation-card">
            <div class="member-info">
                <div class="member-avatar">${(s.user_details?.nome || '?').charAt(0).toUpperCase()}</div>
                <div class="member-details">
                    <h4>${s.user_details?.nome || 'Usuário #' + s.usuario_id}</h4>
                    <p>${s.user_details?.cargo || "Sem cargo definido"}</p>
                </div>
            </div>
            <div class="solicitation-actions">
                <button class="btn-primary" onclick="gerenciarSolicitacao(${s.id}, 'aprovada')">Aceitar</button>
                <button class="btn-outline" onclick="gerenciarSolicitacao(${s.id}, 'recusada')">Recusar</button>
            </div>
        </div>
    `).join('');
}

async function gerenciarSolicitacao(solicitacaoId, acao) {
    try {
        const resp = await fetch(API_URLS.empresas + "/empresas/" + companyId + "/solicitacoes/" + solicitacaoId, {
            method: "PUT",
            headers: authHeaders(),
            body: JSON.stringify({ acao })
        });
        await handleResponse(resp);
        alert(`Solicitação ${acao} com sucesso!`);
        loadSolicitacoesPage();
    } catch (error) {
        alert(error.message);
    }
}

function toggleUserMenu() {
    const menu = document.getElementById("userMenu");
    menu.classList.toggle("show");
}

window.addEventListener("click", function(e) {
    const menu = document.getElementById("userMenu");
    const button = document.querySelector(".user-toggle");
    if (menu && !menu.contains(e.target) && button && !button.contains(e.target)) {
        menu.classList.remove("show");
    }
});

document.addEventListener('DOMContentLoaded', loadSolicitacoesPage);
</script>

</body>
</html>
