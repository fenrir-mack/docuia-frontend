<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>DocIA - Criar Nova Senha</title>
    <link rel="stylesheet" href="{{ url_for('static', path='css/style.css') }}">
</head>
<body>

<main class="page forgot-page">

    <header class="logo forgot-logo">
        <h1>DocIA</h1>
        <p>Documentação Inteligente com IA</p>
    </header>

    <section class="card forgot-card">

        <h2>Criar nova senha</h2>

        <p class="subtitle forgot-subtitle">
            Digite sua nova senha abaixo para redefinir o acesso à sua conta.
        </p>

        <form method="POST">

            <div class="form-group">
                <label>Nova senha</label>
                <div class="input-box">
                    <span class="icon"><img src="{{ url_for('static', path='pngs/lock-keyhole.png') }}" alt="Senha"></span>
                    <input type="password" placeholder="Sua nova senha">
                </div>
            </div>

            <div class="form-group">
                <label>Confirmar nova senha</label>
                <div class="input-box">
                    <span class="icon"><img src="{{ url_for('static', path='pngs/lock-keyhole.png') }}" alt="Senha"></span>
                    <input type="password" placeholder="Repita a nova senha">
                </div>
            </div>

            <button type="submit" class="forgot-button">
                Salvar nova senha
            </button>

        </form>

    </section>

</main>

</body>
</html>
