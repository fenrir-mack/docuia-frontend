<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>DocuIA - Criar Nova Senha</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<main class="page forgot-page">

    <header class="logo forgot-logo">
        <h1>DocuIA</h1>
        <p>Documentação Inteligente com IA</p>
    </header>

    <section class="card forgot-card">

        <h2>Criar nova senha</h2>

        <p class="subtitle forgot-subtitle">
            Digite sua nova senha abaixo para redefinir o acesso à sua conta.
        </p>

        <form method="POST">

            <div class="form-group">
                <label>Nova senha</label>
                <div class="input-box">
                    <span class="icon">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align: middle;"><circle cx="7.5" cy="15.5" r="5.5"/><path d="m21 2-9.6 9.6"/><path d="m15.5 7.5 3 3L22 7l-3-3"/></svg>
                    </span>
                    <input type="password" placeholder="Sua nova senha">
                </div>
            </div>

            <div class="form-group">
                <label>Confirmar nova senha</label>
                <div class="input-box">
                    <span class="icon">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align: middle;"><circle cx="7.5" cy="15.5" r="5.5"/><path d="m21 2-9.6 9.6"/><path d="m15.5 7.5 3 3L22 7l-3-3"/></svg>
                    </span>
                    <input type="password" placeholder="Repita a nova senha">
                </div>
            </div>

            <button type="submit" class="forgot-button">
                Salvar nova senha
            </button>

        </form>

    </section>

    <footer>
        © 2026 DocuIA. Todos os direitos reservados.
    </footer>

</main>

</body>
</html>
