<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>DocIA - Solicitações do Projeto</title>
    <link rel="stylesheet" href="{{ url_for('static', path='css/style.css') }}">
    <script src="{{ url_for('static', path='js/auth-guard.js') }}"></script>
    <script src="/api-config.js"></script>
    <script src="{{ url_for('static', path='js/api.js?v=2') }}"></script>
</head>

<body class="dashboard-body">

<!-- SIDEBAR -->
<aside class="sidebar">
    <div class="sidebar-logo">
        <h2>DocIA</h2>
        <p>Documentação Inteligente</p>
    </div>

    <nav class="menu">
        <a href="/dashboard">
            <img src="{{ url_for('static', path='pngs/dashboard.png') }}" alt="Dashboard" style="width:14px; height:14px; vertical-align:text-bottom; "> <span>Dashboard</span>
        </a>
        <a href="/empresas">
            <img src="{{ url_for('static', path='pngs/business-and-trade.png') }}" alt="Empresas" style="width:14px; height:14px; vertical-align:text-bottom; "> <span>Empresas</span>
        </a>
        <a class="active" href="/projetos">
            <img src="{{ url_for('static', path='pngs/folder.png') }}" alt="Projetos" style="width:14px; height:14px; vertical-align:text-bottom; "> <span>Projetos</span>
        </a>
    </nav>

    <div class="sidebar-bottom">
        <div class="user-dropdown-area">
            <div class="user-menu" id="userMenu">
                <a href="/perfil">♙ Meu Perfil</a>
                <div class="menu-divider"></div>
                <a href="/login" class="logout-link">↪ Sair</a>
            </div>
            <button class="user-box user-toggle" onclick="toggleUserMenu()">
                <div class="profile-mini-avatar">U</div>
                <div class="user-info">
                    <strong id="sidebar-user-name">Usuário</strong>
                    <p id="sidebar-user-email">email@exemplo.com</p>
                </div>
                <span class="dropdown-arrow">⌄</span>
            </button>
        </div>
    </div>
</aside>

<!-- MAIN -->
<main class="dashboard-main">

    <section class="project-internal-content" style="padding: 19px;">

        <div class="project-header-section">
            <a href="/projetos" class="back-to-projects"><span style="margin-right: 6px;">←</span> Voltar para Projetos</a>
            <div class="project-title-area">
                <div class="project-icon-large">
                    <img src="{{ url_for('static', path='pngs/folder.png') }}" alt="Folder" style="width:22px; height:22px; ">
                </div>
                <div class="project-info-large">
                    <h1 id="project-name">Carregando...</h1>
                    <p id="project-description">Carregando descrição do projeto...</p>
                    <p id="project-enterprise" style="margin-top: 3px; font-size: 10px;">Empresa: Carregando...</p>
                </div>
            </div>
        </div>

        <div class="project-tabs" id="project-tabs">
            <a href="#" class="tab" id="tab-visao-geral">Visão Geral</a>
            <a href="#" class="tab" id="tab-membros">Membros</a>
            <a href="#" class="tab active" id="tab-solicitacoes">Solicitações <span class="tab-badge" id="tab-badge-sol">0</span></a>
            <a href="#" class="tab" id="tab-configuracoes">Configurações</a>
        </div>

        <div class="members-header">
            <h2>Solicitações Pendentes</h2>
        </div>

        <div id="solicitacoes-list">
            <p style="padding: 16px; color: #666;">Carregando solicitações...</p>
        </div>

    </section>

</main>

<div class="help-btn">?</div>

<script>
function applyProjectTabsTheme(project) {
    const projectTabs = document.getElementById('project-tabs');
    if (!projectTabs) return;

    projectTabs.classList.remove('theme-teal', 'theme-rose', 'theme-amber', 'theme-indigo', 'theme-emerald', 'theme-cyan');
    projectTabs.style.removeProperty('--project-accent');

    const raw = (project && project.cor ? String(project.cor) : '').trim();
    const themeColors = {
        teal: '#14b8a6',
        rose: '#f43f5e',
        amber: '#f59e0b',
        indigo: '#6366f1',
        emerald: '#10b981',
        cyan: '#06b6d4',
        green: '#10b981',
        blue: '#3154ff',
        purple: '#7c3aed',
        orange: '#f59e0b'
    };

    if (raw.startsWith('#')) {
        projectTabs.style.setProperty('--project-accent', raw);
        return;
    }

    const lower = raw.toLowerCase();
    if (lower in themeColors) {
        projectTabs.style.setProperty('--project-accent', themeColors[lower]);
        if (['teal','rose','amber','indigo','emerald','cyan'].includes(lower)) {
            projectTabs.classList.add(`theme-${lower}`);
        }
    }
}

function resolveAccentColor(project, company) {
    const allowed = ['teal', 'rose', 'amber', 'indigo', 'emerald', 'cyan'];
    const projectCor = project && project.cor ? String(project.cor).trim() : '';
    const companyCor = company && company.cor ? String(company.cor).trim() : '';

    if (allowed.includes(projectCor) && projectCor !== 'teal') return projectCor;
    if (allowed.includes(companyCor)) return companyCor;
    if (allowed.includes(projectCor)) return projectCor;
    return 'teal';
}

const urlParams = new URLSearchParams(window.location.search);
const projectId = urlParams.get('id');

if (!projectId) {
    alert("Projeto não especificado!");
    window.location.href = "/projetos";
}

async function loadSolicitacoesPage() {
    try {
        // Injeta hrefs das tabs com o ?id= correto
        document.getElementById('tab-visao-geral').href = `/projeto?id=${projectId}`;
        document.getElementById('tab-membros').href = `/projeto/membros?id=${projectId}`;
        document.getElementById('tab-solicitacoes').href = `/projeto/solicitacoes?id=${projectId}`;
        document.getElementById('tab-configuracoes').href = `/projeto/configuracoes?id=${projectId}`;

        // 1. Perfil do Usuário (Sidebar)
        const user = await getUserProfile();
        document.getElementById('sidebar-user-name').innerText = user.nome;
        document.getElementById('sidebar-user-email').innerText = user.email;

        // 2. Detalhes do Projeto (MS3)
        const projResp = await fetch(API_URLS.projetos + "/projetos/" + projectId, { headers: authHeaders() });
        const project = await handleResponse(projResp);
        fetch(API_URLS.projetos + `/projetos/${projectId}/acessos`, { method: "POST", headers: authHeaders() }).catch(() => {});
        document.getElementById('project-name').innerText = project.nome;
        document.getElementById('project-description').innerText = project.descricao || "Sem descrição";

        // 3. Empresa (MS2)
        const compResp = await fetch(API_URLS.empresas + "/empresas/" + project.empresa_id, { headers: authHeaders() });
        const company = await handleResponse(compResp);
        document.getElementById('project-enterprise').innerText = "Empresa: " + company.nome;

        const accent = resolveAccentColor(project, company);
        const projectIcon = document.querySelector('.project-icon-large');
        if (projectIcon) {
            projectIcon.classList.remove('teal', 'rose', 'amber', 'indigo', 'emerald', 'cyan');
            projectIcon.classList.add(accent);
        }
        applyProjectTabsTheme({ cor: accent });

        // 4. Solicitações do Projeto
        const solResp = await fetch(API_URLS.projetos + "/projetos/" + projectId + "/solicitacoes", { headers: authHeaders() });
        const solicitacoes = await handleResponse(solResp);
        const pendentes = solicitacoes.filter(s => s.status === 'pendente');
        if (pendentes.length > 0) { document.getElementById('tab-badge-sol').innerText = pendentes.length; document.getElementById('tab-badge-sol').style.display = 'flex'; }
        
        // Buscar info dos usuários
        const userIds = solicitacoes.map(s => s.usuario_id);
        const usersMap = {};
        if (userIds.length > 0) {
            const usersResp = await fetch(API_URLS.auth + "/perfil/usuarios/batch", {
                method: "POST",
                headers: authHeaders(),
                body: JSON.stringify(userIds)
            });
            const usersInfo = await handleResponse(usersResp);
            usersInfo.forEach(u => usersMap[u.id] = u);
        }
        solicitacoes.forEach(s => s.user_details = usersMap[s.usuario_id] || { nome: "Usuário #" + s.usuario_id, cargo: "Sem cargo definido" });

        renderSolicitacoes(solicitacoes);

    } catch (error) {
        console.error("Erro ao carregar solicitações do projeto:", error);
    }
}

function renderSolicitacoes(solicitacoes) {
    const list = document.getElementById('solicitacoes-list');
    const pendentes = solicitacoes.filter(s => s.status === 'pendente');

    if (pendentes.length === 0) {
        list.innerHTML = '<p style="padding: 16px; color: #666;">Nenhuma solicitação pendente.</p>';
        return;
    }

    list.innerHTML = pendentes.map(s => `
        <div class="solicitation-card">
            <div class="member-info">
                <div class="member-avatar">${(s.user_details?.nome || '?').charAt(0).toUpperCase()}</div>
                <div class="member-details">
                    <h4>${s.user_details?.nome || 'Usuário #' + s.usuario_id}</h4>
                    <p>${s.user_details?.cargo || "Sem cargo definido"}</p>
                </div>
            </div>
            <div class="solicitation-actions">
                <button class="btn-primary" onclick="gerenciarSolicitacao(${s.id}, 'aprovada')">Aceitar</button>
                <button class="btn-outline" onclick="gerenciarSolicitacao(${s.id}, 'recusada')">Recusar</button>
            </div>
        </div>
    `).join('');
}

async function gerenciarSolicitacao(solicitacaoId, acao) {
    try {
        const resp = await fetch(API_URLS.projetos + "/projetos/" + projectId + "/solicitacoes/" + solicitacaoId, {
            method: "PUT",
            headers: authHeaders(),
            body: JSON.stringify({ acao })
        });
        await handleResponse(resp);
        alert(`Solicitação ${acao} com sucesso!`);
        loadSolicitacoesPage();
    } catch (error) {
        alert(error.message);
    }
}

function toggleUserMenu() {
    const menu = document.getElementById("userMenu");
    menu.classList.toggle("show");
}

window.addEventListener("click", function(e) {
    const menu = document.getElementById("userMenu");
    const button = document.querySelector(".user-toggle");
    if (menu && !menu.contains(e.target) && button && !button.contains(e.target)) {
        menu.classList.remove("show");
    }
});

document.addEventListener('DOMContentLoaded', loadSolicitacoesPage);
</script>

</body>
</html>
