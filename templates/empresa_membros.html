<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>DocuIA - Membros da Empresa</title>
    <link rel="stylesheet" href="{{ url_for('static', path='css/style.css') }}">
    <script src="{{ url_for('static', path='js/auth-guard.js') }}"></script>
    <script src="/api-config.js"></script>
    <script src="{{ url_for('static', path='js/api.js') }}"></script>
</head>

<body class="dashboard-body">

<aside class="sidebar">
    <div class="sidebar-logo">
        <h2>DocuIA</h2>
        <p>Documentação Inteligente</p>
    </div>

    <nav class="menu">
        <a href="/dashboard">
            <img src="{{ url_for('static', path='pngs/dashboard.png') }}" alt="Dashboard" style="width:18px; height:18px; vertical-align:text-bottom; filter: grayscale(100%) opacity(0.6);"> <span>Dashboard</span>
        </a>
        <a class="active" href="/empresas">
            <img src="{{ url_for('static', path='pngs/business-and-trade.png') }}" alt="Empresas" style="width:18px; height:18px; vertical-align:text-bottom; filter: brightness(0) invert(1);"> <span>Empresas</span>
        </a>
        <a href="/projetos">
            <img src="{{ url_for('static', path='pngs/folder.png') }}" alt="Projetos" style="width:18px; height:18px; vertical-align:text-bottom; filter: grayscale(100%) opacity(0.6);"> <span>Projetos</span>
        </a>
    </nav>

    <div class="sidebar-bottom">
        <div class="user-dropdown-area">
            <div class="user-menu" id="userMenu">
                <a href="/perfil">♙ Meu Perfil</a>
                <div class="menu-divider"></div>
                <a href="/login" class="logout-link">↪ Sair</a>
            </div>

            <button class="user-box user-toggle" onclick="toggleUserMenu()">
                <div class="profile-mini-avatar">U</div>
                <div class="user-info">
                    <strong id="sidebar-user-name">Usuário</strong>
                    <p id="sidebar-user-email">email@exemplo.com</p>
                </div>
                <span class="dropdown-arrow">⌄</span>
            </button>
        </div>
    </div>
</aside>

<main class="dashboard-main">

    <section class="project-internal-content" style="padding: 24px;">

        <a href="/empresas" class="back-link" style="display: inline-flex; align-items: center; color: #64748b; font-weight: 500; margin-bottom: 24px; text-decoration: none;">
            <span style="margin-right: 8px; font-size: 18px;">←</span> Sair da Empresa
        </a>

        <div class="project-header-section">
            <div class="project-title-area">
                <div class="project-icon-large" style="background: #8b5cf6;">
                    <img src="{{ url_for('static', path='pngs/business-and-trade.png') }}" alt="Empresa" style="width:28px; height:28px; filter: brightness(0) invert(1);">
                </div>
                <div class="project-info-large">
                    <h1 id="company-name">Carregando...</h1>
                    <p id="company-description">Carregando descrição da empresa...</p>
                </div>
            </div>
        </div>

                <div class="company-stats-grid">
            <div class="company-stat-card">
                <span><img src="/static/pngs/folder.png" alt="Projetos" style="width:14px; height:14px;"> Projetos</span>
                <strong id="stats-projects">0</strong>
            </div>
            <div class="company-stat-card">
                <span><img src="/static/pngs/users.png" alt="Membros" style="width:14px; height:14px;"> Membros</span>
                <strong id="stats-members">0</strong>
            </div>
            <div class="company-stat-card">
                <span><img src="/static/pngs/file.png" alt="Documentos" style="width:14px; height:14px;"> Documentos</span>
                <strong style="font-size: 14px; font-weight: normal; color: #6b7280; padding-top: 4px;">Em breve</strong>
            </div>
        </div>

        <div class="project-tabs" id="company-tabs">
            <a href="#" class="tab" id="tab-projetos">Projetos</a>
            <a href="#" class="tab active" id="tab-membros">Membros</a>
            <a href="#" class="tab" id="tab-solicitacoes">Solicitações <span class="tab-badge" id="tab-badge-sol">0</span></a>
            <a href="#" class="tab" id="tab-configuracoes">Configurações</a>
        </div>

        <div class="members-header">
            <h2>Membros da Empresa</h2>
        </div>

        <div class="member-list" id="members-list">
            <p style="padding: 20px; color: #666;">Carregando membros...</p>
        </div>

    </section>

</main>

<div class="help-btn">?</div>

<script>
const urlParams = new URLSearchParams(window.location.search);
const companyId = urlParams.get('id');

if (!companyId) {
    alert("Empresa não especificada!");
    window.location.href = "/empresas";
}

async function loadMembersPage() {
    try {
        // Injeta hrefs das tabs com o ?id= correto
        document.getElementById('tab-projetos').href = `/empresa?id=${companyId}`;
        document.getElementById('tab-membros').href = `/empresa/membros?id=${companyId}`;
        document.getElementById('tab-solicitacoes').href = `/empresa/solicitacoes?id=${companyId}`;
        document.getElementById('tab-configuracoes').href = `/empresa/configuracoes?id=${companyId}`;

        // 1. Perfil do Usuário (Sidebar)
        const userResp = await fetch(API_URLS.auth + "/perfil/me", { headers: authHeaders() });
        const user = await handleResponse(userResp);
        document.getElementById('sidebar-user-name').innerText = user.nome;
        document.getElementById('sidebar-user-email').innerText = user.email;

        // 2. Detalhes da Empresa
        const compResp = await fetch(API_URLS.empresas + "/empresas/" + companyId, { headers: authHeaders() });
        const company = await handleResponse(compResp);
        document.getElementById('company-name').innerText = company.nome;
        document.getElementById('company-description').innerText = company.descricao || "Sem descrição disponível";

        // 3. Membros
        const membersResp = await fetch(API_URLS.empresas + "/empresas/" + companyId + "/membros", { headers: authHeaders() });
        const members = await handleResponse(membersResp);

        // Buscar info dos usuários
        const userIds = members.map(m => m.usuario_id);
        const usersResp = await fetch(API_URLS.auth + "/perfil/usuarios/batch", {
            method: "POST",
            headers: authHeaders(),
            body: JSON.stringify(userIds)
        });
        const usersInfo = await handleResponse(usersResp);
        const usersMap = {};
        usersInfo.forEach(u => usersMap[u.id] = u);
        members.forEach(m => m.user_details = usersMap[m.usuario_id] || { nome: "Usuário #" + m.usuario_id, cargo: "Sem cargo definido" });

        document.getElementById('stats-members').innerText = members.length;
                        renderMembers(members);

        // 4. Projetos (para stats)
        const projResp = await fetch(API_URLS.projetos + "/projetos", { headers: authHeaders() });
        const allProjects = await handleResponse(projResp);
        const companyProjects = allProjects.filter(p => p.empresa_id == companyId && p.status !== 'arquivado');
        document.getElementById('stats-projects').innerText = companyProjects.length;

        // 5. Solicitações pendentes (badge)
        const solResp = await fetch(API_URLS.empresas + "/empresas/" + companyId + "/solicitacoes", { headers: authHeaders() });
        const solicitacoes = await handleResponse(solResp);
        const pendentes = solicitacoes.filter(s => s.status === 'pendente').length;
        if (pendentes > 0) { document.getElementById('tab-badge-sol').innerText = pendentes; document.getElementById('tab-badge-sol').style.display = 'flex'; }

    } catch (error) {
        console.error("Erro ao carregar membros:", error);
    }
}

const roleLabels = { owner: '♕ Owner', admin: '⬡ Admin', member: '♙ Member' };
const roleClasses = { owner: 'owner', admin: 'admin', member: 'member' };

function renderMembers(members) {
    const list = document.getElementById('members-list');
    if (members.length === 0) {
        list.innerHTML = '<p style="padding: 20px; color: #666;">Nenhum membro encontrado.</p>';
        return;
    }

    const currentUserId = parseInt(localStorage.getItem('user_id'));
    const myRole = members.find(m => m.usuario_id === currentUserId)?.role;

    list.innerHTML = members.map(m => {
        const initial = m.user_details.nome.charAt(0).toUpperCase();
        const label = roleLabels[m.role] || m.role;
        const cls = roleClasses[m.role] || '';
        const isMe = m.usuario_id === currentUserId;
        const nameSuffix = isMe ? ' (você)' : '';

        let actionsHtml = `<span class="role-badge ${cls}" id="badge-${m.usuario_id}">${label}</span>`;
        const isOwner = m.role === 'owner';
        const canEdit = (myRole === 'owner' || myRole === 'admin') && !isMe && !(myRole === 'admin' && isOwner);
        
        if (canEdit) {
            const ownerOption = myRole === 'owner' ? `<option value="owner" ${m.role === 'owner' ? 'selected' : ''}>♕ Owner</option>` : '';
            actionsHtml += `
                <button class="btn-outline" id="btn-edit-${m.usuario_id}" onclick="enableEdit(${m.usuario_id})" style="padding: 4px 8px; font-size: 12px; margin-left: 8px;">Editar</button>

                <div id="edit-controls-${m.usuario_id}" style="display: none; align-items: center; gap: 8px; margin-left: 8px;">
                    <select class="form-control" id="select-role-${m.usuario_id}" style="width: 110px; padding: 4px; font-size: 13px;">
                        ${ownerOption}
                        <option value="admin" ${m.role === 'admin' ? 'selected' : ''}>⬡ Admin</option>
                        <option value="member" ${m.role === 'member' ? 'selected' : ''}>♙ Member</option>
                    </select>
                    <button class="btn-primary" onclick="confirmEdit(${m.usuario_id})" style="padding: 4px 12px; font-size: 12px;">Salvar</button>
                    <button onclick="removerMembro(${m.usuario_id})" class="btn-outline" style="border-color: #dc2626; color: #dc2626; padding: 4px 8px; font-size: 12px;">Remover</button>
                    <button onclick="cancelEdit(${m.usuario_id})" class="btn-outline" style="padding: 4px; font-size: 12px; border: none; background: transparent; color: #64748b;" title="Cancelar">✕</button>
                </div>
            `;
        }

        return `
        <div class="member-card">
            <div class="member-info">
                <div class="member-avatar">${initial}</div>
                <div class="member-details">
                    <h4>${m.user_details.nome}${nameSuffix}</h4>
                    <p>${m.user_details.cargo || "Sem cargo definido"}</p>
                </div>
            </div>
            <div class="member-actions" style="display: flex; align-items: center;">
                ${actionsHtml}
            </div>
        </div>`;
    }).join('');
}

function enableEdit(usuarioId) {
    document.getElementById(`badge-${usuarioId}`).style.display = 'none';
    document.getElementById(`btn-edit-${usuarioId}`).style.display = 'none';
    document.getElementById(`edit-controls-${usuarioId}`).style.display = 'flex';
}

function cancelEdit(usuarioId) {
    document.getElementById(`badge-${usuarioId}`).style.display = 'inline-block';
    document.getElementById(`btn-edit-${usuarioId}`).style.display = 'inline-block';
    document.getElementById(`edit-controls-${usuarioId}`).style.display = 'none';
}

async function confirmEdit(usuarioId) {
    const novoRole = document.getElementById(`select-role-${usuarioId}`).value;
    await alterarRole(usuarioId, novoRole);
}

async function alterarRole(usuarioIdAlvo, novoRole) {
    try {
        const resp = await fetch(API_URLS.empresas + "/empresas/" + companyId + "/membros/" + usuarioIdAlvo + "/role", {
            method: "PUT",
            headers: authHeaders(),
            body: JSON.stringify({ role: novoRole })
        });
        await handleResponse(resp);
        alert("Cargo alterado com sucesso!");
        loadMembersPage();
    } catch (error) {
        alert(error.message);
        loadMembersPage(); // reload to revert select
    }
}

async function removerMembro(usuarioIdAlvo) {
    if (!confirm("Remover este membro da empresa?")) return;
    try {
        const resp = await fetch(API_URLS.empresas + "/empresas/" + companyId + "/membros/" + usuarioIdAlvo, {
            method: "DELETE",
            headers: authHeaders()
        });
        await handleResponse(resp);
        alert("Membro removido.");
        loadMembersPage();
    } catch (error) {
        alert(error.message);
    }
}

function toggleUserMenu() {
    const menu = document.getElementById("userMenu");
    menu.classList.toggle("show");
}

window.addEventListener("click", function(e) {
    const menu = document.getElementById("userMenu");
    const button = document.querySelector(".user-toggle");
    if (menu && !menu.contains(e.target) && button && !button.contains(e.target)) {
        menu.classList.remove("show");
    }
});

document.addEventListener('DOMContentLoaded', loadMembersPage);
</script>

</body>
</html>
