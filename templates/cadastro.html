<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>DocIA - Cadastro</title>
    <link rel="stylesheet" href="{{ url_for('static', path='css/style.css') }}">
</head>
<body>

<main class="page cadastro-page">

    <header class="logo cadastro-logo">
        <h1>DocIA</h1>
        <p>Documentação Inteligente com IA</p>
    </header>

    <section class="card cadastro-card">
        <h2>Criar sua conta</h2>
        <p class="subtitle">Preencha os dados para começar</p>

        <form id="cadastro-form">
            <div class="form-group">
                <label>Nome completo</label>
                <div class="input-box">
                    <span class="icon"><img src="{{ url_for('static', path='pngs/user.png') }}" alt="Nome"></span>
                    <input type="text" id="nome" placeholder="Seu nome" required>
                </div>
            </div>

            <div class="form-group">
                <label>Cargo</label>
                <div class="input-box">
                    <span class="icon"><img src="{{ url_for('static', path='pngs/briefcase.png') }}" alt="Cargo"></span>
                    <input type="text" id="cargo" placeholder="Seu cargo" required>
                </div>
            </div>

            <div class="form-group">
                <label>E-mail</label>
                <div class="input-box">
                    <span class="icon"><img src="{{ url_for('static', path='pngs/mail.png') }}" alt="E-mail"></span>
                    <input type="email" id="email" placeholder="seu@email.com" required>
                </div>
            </div>

            <div class="form-group">
                <label>Senha</label>
                <div class="input-box">
                    <span class="icon"><img src="{{ url_for('static', path='pngs/lock-keyhole.png') }}" alt="Senha"></span>
                    <input type="password" id="senha" placeholder="Sua senha" required>
                </div>
            </div>

            <div class="form-group">
                <label>Confirmar senha</label>
                <div class="input-box">
                    <span class="icon"><img src="{{ url_for('static', path='pngs/lock-keyhole.png') }}" alt="Senha"></span>
                    <input type="password" id="confirmar-senha" placeholder="Repita sua senha" required>
                </div>
            </div>

            <button type="submit">
                <span class="icon"><img src="{{ url_for('static', path='pngs/user.png') }}" alt="Criar conta"></span>
                Criar conta
            </button>
        </form>

        <p class="bottom-text">
            Já tem uma conta? <a href="/login">Fazer login</a>
        </p>
    </section>

</main>

<script src="/api-config.js"></script>
<script src="{{ url_for('static', path='js/api.js?v=2') }}"></script>
<script>
document.getElementById('cadastro-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const nome = document.getElementById('nome').value;
    const cargo = document.getElementById('cargo').value;
    const email = document.getElementById('email').value;
    const senha = document.getElementById('senha').value;
    const confirmarSenha = document.getElementById('confirmar-senha').value;
    
    if (senha !== confirmarSenha) {
        alert("As senhas não coincidem!");
        return;
    }
    
    const btn = e.target.querySelector('button');
    const originalText = btn.innerHTML;
    
    try {
        btn.innerHTML = "Criando conta...";
        btn.disabled = true;
        
        const response = await fetch(API_URLS.auth + "/auth/cadastro", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ nome, cargo, email, senha })
        });
        
        const data = await handleResponse(response);
        alert(data.mensagem);
        
        // Redireciona pro login
        window.location.href = "/login";
        
    } catch (error) {
        alert(error.message);
    } finally {
        btn.innerHTML = originalText;
        btn.disabled = false;
    }
});
</script>

</body>
</html>
