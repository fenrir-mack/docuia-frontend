<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>DocIA - Membros do Projeto</title>
    <link rel="stylesheet" href="{{ url_for('static', path='css/style.css') }}">
    <script src="{{ url_for('static', path='js/auth-guard.js') }}"></script>
    <script src="/api-config.js"></script>
    <script src="{{ url_for('static', path='js/api.js?v=2') }}"></script>
</head>

<body class="dashboard-body">

<!-- SIDEBAR -->
<aside class="sidebar">

    <div class="sidebar-logo">
        <h2>DocIA</h2>
        <p>Documentação Inteligente</p>
    </div>

    <nav class="menu">
        <a href="/dashboard">
            <img src="{{ url_for('static', path='pngs/dashboard.png') }}" alt="Dashboard" style="width:14px; height:14px; vertical-align:text-bottom; "> <span>Dashboard</span>
        </a>
        <a href="/empresas">
            <img src="{{ url_for('static', path='pngs/business-and-trade.png') }}" alt="Empresas" style="width:14px; height:14px; vertical-align:text-bottom; "> <span>Empresas</span>
        </a>
        <a class="active" href="/projetos">
            <img src="{{ url_for('static', path='pngs/folder.png') }}" alt="Projetos" style="width:14px; height:14px; vertical-align:text-bottom; "> <span>Projetos</span>
        </a>
    </nav>

    <div class="sidebar-bottom">
        <div class="user-dropdown-area">
            <div class="user-menu" id="userMenu">
                <a href="/perfil">♙ Meu Perfil</a>
                <div class="menu-divider"></div>
                <a href="/login" class="logout-link">↪ Sair</a>
            </div>
            <button class="user-box user-toggle" onclick="toggleUserMenu()">
                <div class="profile-mini-avatar">U</div>
                <div class="user-info">
                    <strong id="sidebar-user-name">Usuário</strong>
                    <p id="sidebar-user-email">email@exemplo.com</p>
                </div>
                <span class="dropdown-arrow">⌄</span>
            </button>
        </div>
    </div>

</aside>

<!-- MAIN -->
<main class="dashboard-main">

    <section class="project-internal-content" style="padding: 19px;">

        <div class="project-header-section">
            <a href="/projetos" class="back-to-projects" id="back-link">
                ← Voltar para Projetos
            </a>
            <div class="project-title-area">
                <div class="project-icon-large">
                    <img src="{{ url_for('static', path='pngs/folder.png') }}" alt="Folder" style="width:22px; height:22px; ">
                </div>
                <div class="project-info-large">
                    <h1 id="project-name">Carregando...</h1>
                    <p id="project-description">Carregando descrição do projeto...</p>
                    <p id="project-enterprise" style="margin-top: 3px; font-size: 10px;">Empresa: Carregando...</p>
                </div>
            </div>
        </div>

        <div class="project-tabs" id="project-tabs">
            <a href="#" class="tab" id="tab-visao-geral">Visão Geral</a>
            <a href="#" class="tab active" id="tab-membros">Membros</a>
            <a href="#" class="tab" id="tab-solicitacoes">Solicitações <span class="tab-badge" id="tab-badge-sol">0</span></a>
            <a href="#" class="tab" id="tab-configuracoes">Configurações</a>
        </div>

        <div class="members-header">
            <h2>Membros do Projeto</h2>
        </div>

        <div class="member-list" id="members-list">
            <p style="padding: 16px; color: #666;">Carregando membros...</p>
        </div>

    </section>

</main>

<div class="help-btn">?</div>

<script>
const urlParams = new URLSearchParams(window.location.search);
const projectId = urlParams.get('id');

if (!projectId) {
    alert("Projeto não especificado!");
    window.location.href = "/projetos";
}

async function loadMembersPage() {
    try {
        // Injeta hrefs das tabs com o ?id= correto
        document.getElementById('tab-visao-geral').href = `/projeto?id=${projectId}`;
        document.getElementById('tab-membros').href = `/projeto/membros?id=${projectId}`;
        document.getElementById('tab-solicitacoes').href = `/projeto/solicitacoes?id=${projectId}`;
        document.getElementById('tab-configuracoes').href = `/projeto/configuracoes?id=${projectId}`;

        // 1. Perfil do Usuário (Sidebar)
        const user = await getUserProfile();
        document.getElementById('sidebar-user-name').innerText = user.nome;
        document.getElementById('sidebar-user-email').innerText = user.email;

        // 2. Detalhes do Projeto (MS3)
        const projResp = await fetch(API_URLS.projetos + "/projetos/" + projectId, { headers: authHeaders() });
        const project = await handleResponse(projResp);
        const projectIcon = document.querySelector('.project-icon-large');
        if (projectIcon) {
            projectIcon.classList.add(project.cor || 'teal');
        }
        document.getElementById('project-name').innerText = project.nome;
        document.getElementById('project-description').innerText = project.descricao || "Sem descrição";

        // 3. Empresa do Projeto (MS2)
        const compResp = await fetch(API_URLS.empresas + "/empresas/" + project.empresa_id, { headers: authHeaders() });
        const company = await handleResponse(compResp);
        document.getElementById('project-enterprise').innerText = "Empresa: " + company.nome;

        // 4. Membros do Projeto
        const membersResp = await fetch(API_URLS.projetos + "/projetos/" + projectId + "/membros", { headers: authHeaders() });
        const members = await handleResponse(membersResp);

        // Buscar info dos usuários
        const userIds = members.map(m => m.usuario_id);
        const usersResp = await fetch(API_URLS.auth + "/perfil/usuarios/batch", {
            method: "POST",
            headers: authHeaders(),
            body: JSON.stringify(userIds)
        });
        const usersInfo = await handleResponse(usersResp);
        const usersMap = {};
        usersInfo.forEach(u => usersMap[u.id] = u);
        members.forEach(m => m.user_details = usersMap[m.usuario_id] || { nome: "Usuário #" + m.usuario_id, cargo: "Sem cargo definido" });

        renderMembers(members);

        // 5. Solicitações pendentes (badge)
        const solResp = await fetch(API_URLS.projetos + "/projetos/" + projectId + "/solicitacoes", { headers: authHeaders() });
        const solicitacoes = await handleResponse(solResp);
        const pendentes = solicitacoes.filter(s => s.status === 'pendente').length;
        if (pendentes > 0) { document.getElementById('tab-badge-sol').innerText = pendentes; document.getElementById('tab-badge-sol').style.display = 'flex'; }

    } catch (error) {
        console.error("Erro ao carregar membros do projeto:", error);
    }
}

const roleLabels = { owner: '♕ Owner', admin: '⬡ Admin', member: '♙ Member', editor: '✎ Editor', viewer: '👁 Viewer' };
const roleClasses = { owner: 'owner', admin: 'admin', member: 'member' };

function renderMembers(members) {
    const list = document.getElementById('members-list');
    if (members.length === 0) {
        list.innerHTML = '<p style="padding: 16px; color: #666;">Nenhum membro encontrado.</p>';
        return;
    }

    const currentUserId = parseInt(localStorage.getItem('user_id'));

    list.innerHTML = members.map(m => {
        const initial = m.user_details.nome.charAt(0).toUpperCase();
        const label = roleLabels[m.role] || m.role;
        const cls = roleClasses[m.role] || '';
        const isMe = m.usuario_id === currentUserId ? ' (você)' : '';
        return `
        <div class="member-card">
            <div class="member-info">
                <div class="member-avatar">${initial}</div>
                <div class="member-details">
                    <h4>${m.user_details.nome}${isMe}</h4>
                    <p>${m.user_details.cargo || "Sem cargo definido"}</p>
                </div>
            </div>
            <div class="member-actions">
                <span class="role-badge ${cls}">${label}</span>
            </div>
        </div>`;
    }).join('');
}

function toggleUserMenu() {
    const menu = document.getElementById("userMenu");
    menu.classList.toggle("show");
}

window.addEventListener("click", function(e) {
    const menu = document.getElementById("userMenu");
    const button = document.querySelector(".user-toggle");
    if (menu && !menu.contains(e.target) && button && !button.contains(e.target)) {
        menu.classList.remove("show");
    }
});

document.addEventListener('DOMContentLoaded', loadMembersPage);
</script>

</body>
</html>
