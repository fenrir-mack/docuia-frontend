<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>DocIA - Login</title>
    <link rel="stylesheet" href="{{ url_for('static', path='css/style.css') }}">
</head>
<body>

<main class="page login-page">

    <header class="logo login-logo">
        <h1>DocIA</h1>
        <p>Documentação Inteligente com IA</p>
    </header>

    <section class="card login-card">
        <h2>Bem-vindo de volta</h2>
        <p class="subtitle">Entre com suas credenciais para continuar</p>

        <form id="login-form">
            <div class="form-group">
                <label>E-mail</label>
                <div class="input-box">
                    <span class="icon"><img src="{{ url_for('static', path='pngs/mail.png') }}" alt="E-mail"></span>
                    <input type="email" id="email" placeholder="seu@email.com" required>
                </div>
            </div>

            <div class="form-group">
                <label>Senha</label>
                <div class="input-box">
                    <span class="icon"><img src="{{ url_for('static', path='pngs/lock-keyhole.png') }}" alt="Senha"></span>
                    <input type="password" id="senha" placeholder="Sua senha" required>
                </div>
            </div>

            <div class="options">
                <a href="/esqueceu-senha">Esqueceu a senha?</a>
            </div>

            <button type="submit">
                <span class="icon"><img src="{{ url_for('static', path='pngs/corner-down-right.png') }}" alt="Entrar"></span>
                Entrar
            </button>
        </form>

        <p class="bottom-text">
            Não tem uma conta? <a href="/cadastro">Criar conta</a>
        </p>
    </section>


</main>

<script src="/api-config.js"></script>
<script src="{{ url_for('static', path='js/api.js?v=2') }}"></script>
<script>
document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const email = document.getElementById('email').value;
    const senha = document.getElementById('senha').value;
    const btn = e.target.querySelector('button');
    const originalText = btn.innerHTML;
    
    try {
        btn.innerHTML = "Aguarde...";
        btn.disabled = true;
        
        const response = await fetch(API_URLS.auth + "/auth/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email, senha })
        });
        
        const data = await handleResponse(response);
        setToken(data.token);

        // Buscar o perfil para salvar o user_id no localStorage
        await getUserProfile(true);
        
        // Redireciona em caso de sucesso
        window.location.href = "/dashboard";
        
    } catch (error) {
        alert(error.message);
    } finally {
        btn.innerHTML = originalText;
        btn.disabled = false;
    }
});
</script>

</body>
</html>
