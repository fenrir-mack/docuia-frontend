<!-- SIDEBAR -->
<aside class="sidebar">

    <!-- LOGO -->
    <div class="sidebar-logo">
        <h2>DocIA</h2>
        <p>Documentação Inteligente</p>
    </div>

    <!-- MENU -->
    {% set _active = active_page if active_page is defined else "" %}
    <nav class="menu">
        <a class="{% if _active == 'dashboard' %}active{% endif %}" href="/dashboard">
            <img src="{{ url_for('static', path='pngs/dashboard.png') }}" alt="Dashboard" style="width:14px; height:14px;">
            <span>Dashboard</span>
        </a>

        <a class="{% if _active == 'empresas' %}active{% endif %}" href="/empresas">
            <img src="{{ url_for('static', path='pngs/business-and-trade.png') }}" alt="Empresas" style="width:14px; height:14px;">
            <span>Empresas</span>
        </a>

        <a class="{% if _active == 'projetos' %}active{% endif %}" href="/projetos">
            <img src="{{ url_for('static', path='pngs/folder.png') }}" alt="Projetos" style="width:14px; height:14px;">
            <span>Projetos</span>
        </a>
    </nav>

    <!-- PARTE INFERIOR -->
    <div class="sidebar-bottom">

        <!-- MENU DROPDOWN DO USUÁRIO -->
        <div class="user-dropdown-area">

            <!-- MENU -->
            <div class="user-menu" id="userMenu">
                <a href="/perfil">
                    <img src="{{ url_for('static', path='pngs/user.png') }}" alt="Meu Perfil">Meu Perfil
                </a>

                <div class="menu-divider"></div>

                <a href="/login" class="logout-link">
                    <img src="{{ url_for('static', path='pngs/corner-down-right.png') }}" alt="Sair">Sair
                </a>
            </div>

            <!-- BOTÃO -->
            <button class="user-box user-toggle" onclick="toggleUserMenu()">

                <div class="profile-mini-avatar">
                    U
                </div>

                <div class="user-info">
                    <strong id="sidebar-user-name">Usuário</strong>
                    <p id="sidebar-user-email">email@exemplo.com</p>
                </div>

                <span class="dropdown-arrow">
                    <img src="{{ url_for('static', path='pngs/down-arrow.png') }}" alt="Abrir menu">
                </span>

            </button>

        </div>

    </div>

</aside>
